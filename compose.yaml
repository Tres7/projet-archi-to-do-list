services:
  db:
    image: mysql:8
    env_file:
      - ./server/.env
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER --password=$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  server:
    build: ./server
    env_file:
      - ./server/.env
    ports:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /
    ports:
      - "80:80"
    depends_on:
      - gateway

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
