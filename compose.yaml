services:
  db:
    image: mysql:8
    env_file:
      - ./server/.env.docker
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER --password=$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '8025:8025' # web UI
      - '1025:1025' # SMTP
    
  auth-service:
    build:
      context: ./server
      dockerfile: apps/auth-service/Dockerfile
    env_file:
     - ./server/.env.docker
    depends_on:
      db:
        condition: service_healthy
  
  project-service:
    build:
      context: ./server
      dockerfile: apps/project-service/Dockerfile
    env_file:
      - ./server/.env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  
  task-service:
    build:
      context: ./server
      dockerfile: apps/task-service/Dockerfile
    env_file:
      - ./server/.env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  notification-service:
    build:
      context: ./server
      dockerfile: apps/notification-service/Dockerfile
    env_file:
      - ./server/.env.docker
    depends_on:
      redis:
        condition: service_started
      mailpit:
        condition: service_started

  gateway:
    build:
      context: ./server
      dockerfile: apps/gateway/Dockerfile
    env_file:
      - ./server/.env.docker
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - project-service
      - task-service
      - notification-service

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - gateway

  playwright:
    profiles:
      - test
    image: ${PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright:v1.58.2-noble}
    working_dir: /workspace
    ipc: host
    environment:
      CI: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      MYSQL_HOST: db
      REDIS_HOST: redis
      SMTP_HOST: mailpit
    volumes:
      - ./:/workspace
      - playwright_server_node_modules:/workspace/server/node_modules
      - playwright_client_node_modules:/workspace/client/node_modules
      - playwright_npm_cache:/root/.npm
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    command: >
      bash -lc "npm --prefix server ci &&
      npm --prefix client ci &&
      cd server &&
      npx wait-port db:3306 redis:6379 mailpit:1025 &&
      cd /workspace &&
      npm --prefix client run test:e2e"


volumes:
  db_data:
  playwright_server_node_modules:
  playwright_client_node_modules:
  playwright_npm_cache:
