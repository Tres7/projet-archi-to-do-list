services:
  db:
    image: mysql:8
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - ${MYSQL_PORT_PUBLISHED:-3306}:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - ${REDIS_PORT_PUBLISHED:-6379}:6379
  mailpit:
    image: axllent/mailpit:v1.30.2
    restart: unless-stopped
    ports:
      - ${MAILPIT_UI_PORT_PUBLISHED:-8025}:8025
      - ${MAILPIT_SMTP_PORT_PUBLISHED:-1025}:1025
  auth-service:
    image: ghcr.io/tres7/projet-archi-to-do-list/auth-service@sha256:47fc58c158599cc447339b5dde9a94ea19e97ceec03a999ba895d33c0d430de7
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
  project-service:
    image: ghcr.io/tres7/projet-archi-to-do-list/project-service@sha256:d562c32872eaeca433f0a12315f7778ca39a7f3afc41bc338a243c3d54f20ca9
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  task-service:
    image: ghcr.io/tres7/projet-archi-to-do-list/task-service@sha256:c9ba2f810752101efa23f807e5fcec120e019c7ae0c65fc265c6c7cc7cce849a
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  notification-service:
    image: ghcr.io/tres7/projet-archi-to-do-list/notification-service@sha256:2e12029ade0c45386ab6c144665426affdc7106910d4e09ede22ea9c96fbddc4
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_started
      mailpit:
        condition: service_started
  gateway:
    image: ghcr.io/tres7/projet-archi-to-do-list/gateway@sha256:319f778ad82b22f3edad092c3c99c984c5edd0633e8ca3febec4921c9d8c8bf6
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    ports:
      - ${GATEWAY_PORT_PUBLISHED:-3000}:3000
    depends_on:
      auth-service:
        condition: service_started
      project-service:
        condition: service_started
      task-service:
        condition: service_started
      notification-service:
        condition: service_started
  client:
    image: ghcr.io/tres7/projet-archi-to-do-list/client@sha256:c856a842f8b23168dc37df75c556f7651300732f2ae6914d98ea97c32828ccf3
    pull_policy: always
    restart: unless-stopped
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - ${CLIENT_PORT_PUBLISHED:-80}:80
    depends_on:
      gateway:
        condition: service_started
volumes:
  db_data: {}
