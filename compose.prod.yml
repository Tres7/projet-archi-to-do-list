services:
  db:
    image: mysql:8
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT_PUBLISHED:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u $$MYSQL_USER --password=$$MYSQL_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_PUBLISHED:-6379}:6379"

  mailpit:
    image: axllent/mailpit:v1.30.2
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT_PUBLISHED:-8025}:8025"
      - "${MAILPIT_SMTP_PORT_PUBLISHED:-1025}:1025"

  auth-service:
    image: ${AUTH_SERVICE_IMAGE:?AUTH_SERVICE_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  project-service:
    image: ${PROJECT_SERVICE_IMAGE:?PROJECT_SERVICE_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  task-service:
    image: ${TASK_SERVICE_IMAGE:?TASK_SERVICE_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  notification-service:
    image: ${NOTIFICATION_SERVICE_IMAGE:?NOTIFICATION_SERVICE_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_started
      mailpit:
        condition: service_started

  gateway:
    image: ${GATEWAY_IMAGE:?GATEWAY_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    environment:
      NODE_ENV: production
    ports:
      - "${GATEWAY_PORT_PUBLISHED:-3000}:3000"
    depends_on:
      auth-service:
        condition: service_started
      project-service:
        condition: service_started
      task-service:
        condition: service_started
      notification-service:
        condition: service_started

  client:
    image: ${CLIENT_IMAGE:?CLIENT_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${CLIENT_PORT_PUBLISHED:-80}:80"
    depends_on:
      gateway:
        condition: service_started

volumes:
  db_data:
