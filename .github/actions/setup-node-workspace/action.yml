name: Setup Node workspace
description: Sets up Node.js and installs dependencies for a given workspace

inputs:
  working-directory:
    description: Workspace directory containing package.json (e.g. server, client)
    required: true
  node-version:
    description: Node.js version to use
    required: false
    default: "24.x"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Debug workspace state
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::npm config"
        npm config list
        echo "::endgroup::"
        echo "::group::workspace files"
        cat package.json
        ls -la common/ 2>/dev/null || echo "no common/ dir"
        cat common/package.json 2>/dev/null || echo "no common/package.json"
        echo "::endgroup::"
        echo "::group::package-lock.json common entries"
        grep -n "@app/common\|\"common\":" package-lock.json
        echo "::endgroup::"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        npm ci --loglevel verbose 2>&1 | tee /tmp/npm-ci-verbose.log || true
        echo "::group::npm ci verbose tail"
        tail -150 /tmp/npm-ci-verbose.log
        echo "::endgroup::"
        npm ci
