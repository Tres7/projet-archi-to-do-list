name: Build service image
description: Builds or publishes one runtime service image with registry-backed minimal Docker cache

inputs:
  service:
    description: Runtime service id
    required: true
  context:
    description: Docker build context
    required: true
  dockerfile:
    description: Dockerfile path
    required: true
  image-repository:
    description: GHCR image repository without tag
    required: true
  source-revision:
    description: Source Git SHA used for image labels and SHA tag
    required: true
  version:
    description: Package version used for OCI labels
    required: true
  push:
    description: Whether to push the image and cache
    required: false
    default: "false"
  load:
    description: Whether to load the built image into the local Docker daemon
    required: false
    default: "false"
  tag-mode:
    description: Tag set to apply to the image, either release or candidate
    required: false
    default: release
  candidate-tag:
    description: Unique candidate tag used before the deployment manifest is published
    required: false
    default: ""

outputs:
  digest:
    description: Image digest returned by Docker Buildx
    value: ${{ steps.result.outputs.digest }}
  immutable_image_ref:
    description: Immutable GHCR image reference with digest
    value: ${{ steps.result.outputs.immutable_image_ref }}
  version_tag:
    description: GHCR image reference tagged with the package version
    value: ${{ steps.result.outputs.version_tag }}
  sha_tag:
    description: GHCR image reference tagged with the source revision
    value: ${{ steps.result.outputs.sha_tag }}
  rolling_tag:
    description: GHCR image reference tagged as main
    value: ${{ steps.result.outputs.rolling_tag }}
  candidate_tag:
    description: GHCR image reference tagged with the candidate tag
    value: ${{ steps.result.outputs.candidate_tag }}
  candidate_ref:
    description: Candidate GHCR image reference without digest
    value: ${{ steps.result.outputs.candidate_ref }}

runs:
  using: composite
  steps:
    - name: Login to GHCR
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      with:
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]

    - name: Resolve image tags
      id: tags
      shell: bash
      env:
        CANDIDATE_TAG: ${{ inputs.candidate-tag }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        SOURCE_REVISION: ${{ inputs.source-revision }}
        TAG_MODE: ${{ inputs.tag-mode }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        case "$TAG_MODE" in
          release)
            tags=(
              "${IMAGE_REPOSITORY}:${VERSION}"
              "${IMAGE_REPOSITORY}:main"
              "${IMAGE_REPOSITORY}:sha-${SOURCE_REVISION}"
            )
            ;;
          candidate)
            if [ -z "$CANDIDATE_TAG" ]; then
              echo "::error::candidate-tag is required when tag-mode is candidate."
              exit 1
            fi
            tags=("${IMAGE_REPOSITORY}:${CANDIDATE_TAG}")
            ;;
          *)
            echo "::error::Unsupported tag-mode '$TAG_MODE'. Expected 'release' or 'candidate'."
            exit 1
            ;;
        esac

        {
          echo "tags<<EOF"
          printf '%s\n' "${tags[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        if [ -n "$CANDIDATE_TAG" ]; then
          echo "candidate_ref=${IMAGE_REPOSITORY}:${CANDIDATE_TAG}" >> "$GITHUB_OUTPUT"
        else
          echo "candidate_ref=" >> "$GITHUB_OUTPUT"
        fi

    - name: Build image
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: linux/amd64
        load: ${{ inputs.load }}
        push: ${{ inputs.push }}
        tags: ${{ steps.tags.outputs.tags }}
        labels: |
          org.opencontainers.image.title=${{ inputs.service }}
          org.opencontainers.image.version=${{ inputs.version }}
          org.opencontainers.image.revision=${{ inputs.source-revision }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          app.service-id=${{ inputs.service }}
        cache-from: type=registry,ref=${{ inputs.image-repository }}:buildcache
        cache-to: ${{ inputs.push == 'true' && format('type=registry,ref={0}:buildcache,mode=min', inputs.image-repository) || '' }}

    - name: Publish image outputs
      id: result
      shell: bash
      env:
        DIGEST: ${{ steps.build.outputs.digest }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        SOURCE_REVISION: ${{ inputs.source-revision }}
        VERSION: ${{ inputs.version }}
        CANDIDATE_TAG: ${{ inputs.candidate-tag }}
        CANDIDATE_REF: ${{ steps.tags.outputs.candidate_ref }}
      run: |
        set -euo pipefail

        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
        if [ -n "$DIGEST" ]; then
          echo "immutable_image_ref=${IMAGE_REPOSITORY}@${DIGEST}" >> "$GITHUB_OUTPUT"
        else
          echo "immutable_image_ref=" >> "$GITHUB_OUTPUT"
        fi
        echo "version_tag=${IMAGE_REPOSITORY}:${VERSION}" >> "$GITHUB_OUTPUT"
        echo "sha_tag=${IMAGE_REPOSITORY}:sha-${SOURCE_REVISION}" >> "$GITHUB_OUTPUT"
        echo "rolling_tag=${IMAGE_REPOSITORY}:main" >> "$GITHUB_OUTPUT"
        echo "candidate_tag=${CANDIDATE_TAG}" >> "$GITHUB_OUTPUT"
        echo "candidate_ref=${CANDIDATE_REF}" >> "$GITHUB_OUTPUT"
