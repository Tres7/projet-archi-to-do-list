name: Client checks
description: Runs client lint, build, E2E, and license checks with lockfile-keyed npm cache

inputs:
  run-quality:
    description: Run lint and build
    required: true
  run-e2e:
    description: Run frontend Playwright E2E
    required: true
  run-license:
    description: Run license policy check
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node workspace
      if: ${{ inputs.run-quality == 'true' || inputs.run-license == 'true' }}
      uses: ./.github/actions/setup-node-workspace
      with:
        working-directory: client

    - name: Run client linter
      if: ${{ inputs.run-quality == 'true' }}
      shell: bash
      working-directory: client
      run: npm run lint

    - name: Build client
      if: ${{ inputs.run-quality == 'true' }}
      shell: bash
      working-directory: client
      run: npm run build

    - name: Check client licenses
      if: ${{ inputs.run-license == 'true' }}
      shell: bash
      working-directory: client
      run: npx license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;CC-BY-3.0;CC-BY-4.0;Python-2.0;BlueOak-1.0.0" --excludePrivatePackages

    - name: Run frontend E2E tests
      if: ${{ inputs.run-e2e == 'true' }}
      shell: bash
      run: make ci-frontend-e2e

    - name: Upload frontend E2E reports
      if: ${{ always() && inputs.run-e2e == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: frontend-e2e-reports
        path: |
          client/playwright-report/**
          client/test-results/**
        if-no-files-found: warn
        retention-days: 14
