name: Pre Push Main

on:
  push:
    branches:
      - main

concurrency:
  group: pre-push-main
  cancel-in-progress: false

jobs:
  version-packages:
    name: Version packages
    if: &main-publish-guard >-
      ${{
        github.actor != 'dependabot[bot]' &&
        github.event.head_commit.author.username != 'dependabot[bot]' &&
        github.event.head_commit.committer.username != 'dependabot[bot]' &&
        contains(github.event.head_commit.message, 'dependabot/') == false &&
        contains(github.event.head_commit.message, '[skip ci]') == false
      }}
    uses: ./.github/workflows/_main-version-packages.yml
    secrets:
      cd_app_private_key: ${{ secrets.CD_APP_PRIVATE_KEY }}

  plan:
    name: Detect changed services
    needs: version-packages
    if: *main-publish-guard
    uses: ./.github/workflows/_main-plan.yml
    with:
      source_revision: ${{ needs.version-packages.outputs.head_sha }}
      event_before: ${{ github.event.before }}
      event_sha: ${{ github.sha }}

  verify-images:
    name: Verify images
    needs:
      - version-packages
      - plan
    if: ${{ needs.plan.outputs.service_count != '0' }}
    uses: ./.github/workflows/_main-verify-image.yml
    with:
      candidate_tag: ${{ needs.plan.outputs.candidate_tag }}
      image_root: ${{ needs.plan.outputs.image_root }}
      service_matrix: ${{ needs.plan.outputs.service_matrix }}
      source_revision: ${{ needs.version-packages.outputs.head_sha }}

  push-images:
    name: Push images
    needs:
      - version-packages
      - plan
      - verify-images
    if: >-
      ${{
        needs.plan.outputs.service_count != '0' &&
        needs.verify-images.result == 'success'
      }}
    uses: ./.github/workflows/_main-push-image.yml
    with:
      candidate_tag: ${{ needs.plan.outputs.candidate_tag }}
      image_root: ${{ needs.plan.outputs.image_root }}
      service_matrix: ${{ needs.plan.outputs.service_matrix }}
      source_revision: ${{ needs.version-packages.outputs.head_sha }}

  update-integration:
    name: Publish deployment manifest
    needs:
      - version-packages
      - plan
      - push-images
    if: >-
      ${{
        needs.plan.outputs.service_count != '0' &&
        needs.push-images.result == 'success'
      }}
    uses: ./.github/workflows/_main-publish-manifest.yml
    with:
      source_revision: ${{ needs.version-packages.outputs.head_sha }}
    secrets:
      cd_app_private_key: ${{ secrets.CD_APP_PRIVATE_KEY }}

  finalize-image-tags:
    name: Finalize image tags
    needs:
      - version-packages
      - plan
      - push-images
      - update-integration
    if: >-
      ${{
        needs.plan.outputs.service_count != '0' &&
        needs.push-images.result == 'success' &&
        needs.update-integration.result == 'success' &&
        needs.update-integration.outputs.manifest_published == 'true'
      }}
    uses: ./.github/workflows/_main-finalize-tags.yml
    with:
      service_matrix: ${{ needs.plan.outputs.service_matrix }}
      source_revision: ${{ needs.version-packages.outputs.head_sha }}

  dispatch-integration-deploy:
    name: Dispatch integration deploy
    needs:
      - plan
      - update-integration
      - finalize-image-tags
    if: >-
      ${{
        needs.plan.outputs.service_count != '0' &&
        needs.update-integration.result == 'success' &&
        needs.finalize-image-tags.result == 'success' &&
        needs.update-integration.outputs.manifest_published == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Deploy Integration workflow
        env:
          GH_TOKEN: ${{ github.token }}
          MANIFEST_VERSION: ${{ needs.update-integration.outputs.manifest_version }}
        run: >
          gh workflow run deploy-integration.yml
          --repo "$GITHUB_REPOSITORY"
          --ref main
          -f deploy_ref=main
          -f manifest_version="$MANIFEST_VERSION"
