name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy.
        required: true
        type: string
        default: main
      deploy_path:
        description: Absolute deployment directory on the production VM.
        required: true
        type: string
        default: /opt/projet-archi-to-do-list-production
      manifest_version:
        description: Deployment manifest version. Defaults to the latest manifest.
        required: false
        type: string
        default: ""
  workflow_run:
    workflows:
      - Deploy Integration
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: read

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Resolve deployment inputs
        id: inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_DEPLOY_REF: ${{ inputs.deploy_ref }}
          DISPATCH_DEPLOY_PATH: ${{ inputs.deploy_path }}
          DISPATCH_MANIFEST_VERSION: ${{ inputs.manifest_version }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            deploy_ref="${WORKFLOW_RUN_SHA:-main}"
            deploy_path="/opt/projet-archi-to-do-list-production"
            manifest_version=""
          else
            deploy_ref="${DISPATCH_DEPLOY_REF:-main}"
            deploy_path="${DISPATCH_DEPLOY_PATH:-/opt/projet-archi-to-do-list-production}"
            manifest_version="${DISPATCH_MANIFEST_VERSION:-}"
          fi

          if [[ -z "$deploy_ref" || ! "$deploy_ref" =~ ^[A-Za-z0-9._/@-]+$ ]]; then
            echo "::error::deploy_ref must contain only letters, numbers, dots, underscores, slashes, @, or dashes."
            exit 1
          fi

          if [[ -z "$deploy_path" || "$deploy_path" != /* || "$deploy_path" = "/" ]]; then
            echo "::error::deploy_path must be an absolute path and must not be /."
            exit 1
          fi

          if [[ -n "$manifest_version" && ! "$manifest_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::manifest_version must be SemVer when provided."
            exit 1
          fi

          echo "deploy_ref=$deploy_ref" >> "$GITHUB_OUTPUT"
          echo "deploy_path=$deploy_path" >> "$GITHUB_OUTPUT"
          echo "manifest_version=$manifest_version" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"

      - name: Fetch trusted workflow source
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TRUSTED_REF: main
        run: |
          set -euo pipefail

          source_dir="$RUNNER_TEMP/trusted-source"
          archive="$RUNNER_TEMP/trusted-source.tar.gz"
          rm -rf "$source_dir"
          mkdir -p "$source_dir"

          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/tarball/$TRUSTED_REF" \
            -o "$archive"

          tar -xzf "$archive" -C "$source_dir" --strip-components=1
          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"

      - name: Install manifest dependencies
        run: npm ci --prefix "${{ steps.source.outputs.source_dir }}/server"

      - name: Resolve deployment manifest
        id: manifest
        env:
          MANIFEST_VERSION: ${{ steps.inputs.outputs.manifest_version }}
          REPOSITORY_ROOT: ${{ steps.source.outputs.source_dir }}
        run: >
          node "${REPOSITORY_ROOT}/.github/scripts/manifest.mjs" latest
          --version "$MANIFEST_VERSION"
          --github-output "$GITHUB_OUTPUT"

      - name: Validate deployment manifest
        env:
          REPOSITORY_ROOT: ${{ steps.source.outputs.source_dir }}
        run: >
          node "${REPOSITORY_ROOT}/.github/scripts/manifest.mjs" validate-compose
          --manifest "${{ steps.manifest.outputs.manifest_path }}"
          --output "$RUNNER_TEMP/production-images.env"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_REPOSITORY: ${{ github.repository }}
          DEPLOY_REF: ${{ steps.inputs.outputs.deploy_ref }}
          DEPLOY_PATH: ${{ steps.inputs.outputs.deploy_path }}
          MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
          MANIFEST_VERSION: ${{ steps.manifest.outputs.manifest_version }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VM_HOST_PROD }}
          username: ${{ secrets.VM_USER_PROD }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          envs: DEPLOY_REPOSITORY,DEPLOY_REF,DEPLOY_PATH,MANIFEST_PATH,MANIFEST_VERSION,GHCR_USER,GHCR_TOKEN
          command_timeout: 20m
          script: |
            set -eu

            case "${DEPLOY_REF:-}" in
              ""|*[!A-Za-z0-9._/@-]*)
                echo "DEPLOY_REF contains unsupported characters."
                exit 1
                ;;
            esac

            case "${DEPLOY_PATH:-}" in
              ""|"/")
                echo "DEPLOY_PATH must not be empty or /."
                exit 1
                ;;
              /*)
                ;;
              *)
                echo "DEPLOY_PATH must be absolute."
                exit 1
                ;;
            esac

            case "${MANIFEST_PATH:-}" in
              deploy/manifests/manifest-*.yaml|deploy/manifests/manifest-*.yml)
                ;;
              *)
                echo "Unsupported MANIFEST_PATH: ${MANIFEST_PATH:-}"
                exit 1
                ;;
            esac

            if [ -z "${DEPLOY_REPOSITORY:-}" ] || [ -z "${GHCR_USER:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
              echo "Missing deployment environment variables."
              exit 1
            fi

            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                SUDO="sudo"
              else
                echo "The deployment user must be root or have passwordless sudo."
                exit 1
              fi
            fi

            install_packages() {
              if ! command -v apt-get >/dev/null 2>&1; then
                echo "Automatic bootstrap supports apt-based Linux servers only."
                echo "Install ca-certificates, curl, tar, Docker, and the Docker Compose plugin manually."
                exit 1
              fi

              $SUDO apt-get update
              $SUDO env DEBIAN_FRONTEND=noninteractive apt-get install -y \
                ca-certificates \
                curl \
                tar \
                docker.io \
                docker-compose-plugin
            }

            if ! command -v curl >/dev/null 2>&1 || \
              ! command -v tar >/dev/null 2>&1 || \
              ! command -v docker >/dev/null 2>&1; then
              install_packages
            fi

            if command -v systemctl >/dev/null 2>&1; then
              $SUDO systemctl enable --now docker
            elif command -v service >/dev/null 2>&1; then
              $SUDO service docker start || true
            fi

            docker_cmd() {
              $SUDO docker "$@"
            }

            if ! docker_cmd compose version >/dev/null 2>&1; then
              install_packages
            fi

            if ! docker_cmd compose version >/dev/null 2>&1; then
              echo "Docker Compose plugin is required."
              exit 1
            fi

            DEPLOY_ROOT="${DEPLOY_PATH%/}"
            APP_DIR="$DEPLOY_ROOT/app"
            RELEASE_DIR="$DEPLOY_ROOT/release"
            PREVIOUS_DIR="$DEPLOY_ROOT/previous"
            SHARED_DIR="$DEPLOY_ROOT/shared"
            SHARED_ENV="$SHARED_DIR/server.env.docker"
            SHARED_COMPOSE_ENV="$SHARED_DIR/compose.env"
            TMP_DIR="$(mktemp -d)"

            cleanup() {
              rm -rf "$TMP_DIR"
            }
            trap cleanup EXIT HUP INT TERM

            $SUDO mkdir -p "$DEPLOY_ROOT" "$SHARED_DIR"
            $SUDO chown -R "$(id -u):$(id -g)" "$DEPLOY_ROOT"

            ARCHIVE="$TMP_DIR/source.tar.gz"
            curl -fsSL \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$DEPLOY_REPOSITORY/tarball/$DEPLOY_REF" \
              -o "$ARCHIVE"

            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$ARCHIVE" -C "$RELEASE_DIR" --strip-components=1

            if [ -f "$APP_DIR/server/.env.docker" ] && [ ! -f "$SHARED_ENV" ]; then
              cp "$APP_DIR/server/.env.docker" "$SHARED_ENV"
            fi

            if [ -f "$SHARED_ENV" ]; then
              cp "$SHARED_ENV" "$RELEASE_DIR/server/.env.docker"
            elif [ -f "$RELEASE_DIR/server/.env.docker" ]; then
              cp "$RELEASE_DIR/server/.env.docker" "$SHARED_ENV"
            else
              echo "Missing server environment file. Create $SHARED_ENV before deploying."
              exit 1
            fi

            if [ -f "$SHARED_COMPOSE_ENV" ]; then
              cp "$SHARED_COMPOSE_ENV" "$RELEASE_DIR/.env"
            else
              cat > "$RELEASE_DIR/.env" <<'COMPOSE_ENV'
            MYSQL_PORT_PUBLISHED=127.0.0.1:3306
            REDIS_PORT_PUBLISHED=127.0.0.1:6379
            MAILPIT_SMTP_PORT_PUBLISHED=127.0.0.1:1025
            MAILPIT_UI_PORT_PUBLISHED=127.0.0.1:8025
            GATEWAY_PORT_PUBLISHED=127.0.0.1:3000
            CLIENT_PORT_PUBLISHED=80
            COMPOSE_ENV
              cp "$RELEASE_DIR/.env" "$SHARED_COMPOSE_ENV"
            fi

            MANIFEST_FILE="$RELEASE_DIR/$MANIFEST_PATH"
            if [ ! -f "$MANIFEST_FILE" ]; then
              echo "Manifest $MANIFEST_PATH was not found in the release archive."
              exit 1
            fi

            manifest_image() {
              service="$1"
              awk -v service="$service" '
                $0 == "  " service ":" { in_service = 1; next }
                in_service && /^  [A-Za-z0-9_-]+:/ { in_service = 0 }
                in_service && /^    image: / {
                  sub(/^    image: /, "")
                  print
                  exit
                }
              ' "$MANIFEST_FILE"
            }

            IMAGE_ENV="$RELEASE_DIR/deploy/images.env"
            {
              echo "AUTH_SERVICE_IMAGE=$(manifest_image auth-service)"
              echo "PROJECT_SERVICE_IMAGE=$(manifest_image project-service)"
              echo "TASK_SERVICE_IMAGE=$(manifest_image task-service)"
              echo "NOTIFICATION_SERVICE_IMAGE=$(manifest_image notification-service)"
              echo "GATEWAY_IMAGE=$(manifest_image gateway)"
              echo "CLIENT_IMAGE=$(manifest_image client)"
            } > "$IMAGE_ENV"

            if grep -q '=$' "$IMAGE_ENV"; then
              echo "Failed to extract all image refs from $MANIFEST_PATH."
              cat "$IMAGE_ENV"
              exit 1
            fi

            rm -rf "$PREVIOUS_DIR"
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$PREVIOUS_DIR"
            fi
            mv "$RELEASE_DIR" "$APP_DIR"

            compose_cmd() {
              docker_cmd compose \
                --env-file "$APP_DIR/.env" \
                --env-file "$APP_DIR/deploy/images.env" \
                --project-name todo-production \
                --project-directory "$APP_DIR" \
                -f "$APP_DIR/compose.prod.yml" \
                "$@"
            }

            printf '%s' "$GHCR_TOKEN" | docker_cmd login ghcr.io -u "$GHCR_USER" --password-stdin

            compose_cmd config --quiet
            compose_cmd pull

            if compose_cmd up --help | grep -q -- '--wait'; then
              compose_cmd up -d --wait --remove-orphans
            else
              compose_cmd up -d --remove-orphans
            fi

            compose_cmd ps
            echo "Production deployment of manifest ${MANIFEST_VERSION:-latest} finished in $APP_DIR."
