name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref recorded for this deployment.
        required: true
        type: string
        default: main
      deploy_path:
        description: Absolute deployment directory on the production VM.
        required: true
        type: string
        default: /opt/projet-archi-to-do-list-production
      manifest_version:
        description: Deployment manifest version. Defaults to the latest manifest.
        required: false
        type: string
        default: ""
  workflow_run:
    workflows:
      - Deploy Integration
    types:
      - completed
    branches:
      - main

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_deploy-compose.yml
    with:
      deploy_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.deploy_ref }}
      deploy_path: ${{ github.event_name == 'workflow_run' && '/opt/projet-archi-to-do-list-production' || inputs.deploy_path }}
      deployment_name: todo-production
      environment_name: production
      manifest_version: ${{ github.event_name == 'workflow_dispatch' && inputs.manifest_version || '' }}
    secrets:
      vm_host: ${{ secrets.VM_HOST_PROD }}
      vm_user: ${{ secrets.VM_USER_PROD }}
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
