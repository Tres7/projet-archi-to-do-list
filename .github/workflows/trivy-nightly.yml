name: Trivy nightly

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  production-images:
    name: Read production images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      count: ${{ steps.images.outputs.count }}
      matrix: ${{ steps.images.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node workspace (server)
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: List production image refs
        id: images
        run: >
          node .github/scripts/manifest.mjs list-images
          --manifest deploy/manifests/production.yaml
          --github-output "$GITHUB_OUTPUT"

  trivy-nightly:
    name: Scan ${{ matrix.service }}
    needs: production-images
    if: ${{ needs.production-images.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.production-images.outputs.matrix) }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Scan image digest with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
