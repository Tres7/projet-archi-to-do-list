name: PR Docker Checks

on:
  workflow_call:
    inputs:
      docker_compose:
        required: true
        type: string
      docker_count:
        required: true
        type: string
      docker_matrix:
        required: true
        type: string
      image_root:
        required: true
        type: string
      source_revision:
        required: true
        type: string

jobs:
  compose:
    name: Docker Compose check
    runs-on: ubuntu-latest
    if: ${{ inputs.docker_compose == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Docker Compose
        run: docker compose config --quiet

  services:
    name: Docker service check
    runs-on: ubuntu-latest
    if: ${{ inputs.docker_count != '0' }}
    timeout-minutes: 35
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.docker_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: ${{ matrix.dockerfile }}

      - name: Build image without pushing
        uses: ./.github/actions/build-service-image
        with:
          service: ${{ matrix.service }}
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          image-repository: ${{ inputs.image_root }}/${{ matrix.imageName }}
          source-revision: ${{ inputs.source_revision }}
          version: ${{ matrix.version }}
          push: "false"
