name: Gitleaks
on:
    push:
        branches-ignore:
            - main

jobs:
    gitleaks:
        name: Detect secrets
        runs-on: ubuntu-latest
    
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 2
            
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2