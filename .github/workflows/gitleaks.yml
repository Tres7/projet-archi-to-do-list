name: Gitleaks
on:
    push:
        branches-ignore:
            - main

jobs:
    gitleaks:
        name: Detect secrets
        runs-on: ubuntu-latest
    
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 0
            
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e