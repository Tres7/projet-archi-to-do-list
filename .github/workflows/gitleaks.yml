name: Gitleaks
on:
    push:
        branches-ignore:
            - main

jobs:
    gitleaks:
        name: Detect secrets
        runs-on: ubuntu-latest
    
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7