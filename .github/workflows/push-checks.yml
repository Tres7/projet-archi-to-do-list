name: Push Checks

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project:
          - server
          - client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node workspace (${{ matrix.project }})
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: ${{ matrix.project }}

      - name: Run linter
        working-directory: ${{ matrix.project }}
        run: npm run lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node workspace (server)
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: Prepare test output directory
        working-directory: server
        run: mkdir -p test_outputs

      - name: Run backend unit tests with coverage
        working-directory: server
        run: npm run test:unit -- --coverage --json --outputFile=unit-results.json

      - name: Upload unit test artifacts
        uses: ./.github/actions/upload-test-artifacts
        with:
          name-prefix: backend-unit
          results-path: server/unit-results.json
          coverage-path: server/coverage/unit/**
