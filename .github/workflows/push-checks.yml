name: Push Checks

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x

jobs:
  lint:
    name: Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project:
          - server
          - client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Run linter
        working-directory: ${{ matrix.project }}
        run: npm run lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Prepare test output directory
        working-directory: server
        run: mkdir -p test_outputs

      - name: Run backend unit tests with coverage
        working-directory: server
        run: npm run test:unit -- --coverage --json --outputFile=unit-results.json

      - name: Upload unit test result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-results
          path: server/unit-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-coverage
          path: server/coverage/unit/**
          if-no-files-found: warn
          retention-days: 30
