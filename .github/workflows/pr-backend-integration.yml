name: PR Backend Integration Tests

on:
  workflow_run:
    workflows:
      - PR Unit Tests
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x

jobs:
  gate:
    name: Require successful unit tests
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      head_repository: ${{ steps.context.outputs.head_repository }}
      pr_number: ${{ steps.context.outputs.pr_number }}
    steps:
      - name: Capture PR context
        id: context
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_repository=$HEAD_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.gate.outputs.head_repository }}
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend integration tests with coverage
        run: make ci-backend-integration

      - name: Upload integration test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: server/integration-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-coverage
          path: server/coverage/integration/**
          if-no-files-found: warn
          retention-days: 30

  backend-e2e:
    name: Backend E2E integration tests
    runs-on: ubuntu-latest
    needs:
      - gate
      - integration
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.gate.outputs.head_repository }}
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend E2E integration tests with coverage
        run: make ci-backend-e2e

      - name: Save PR context for frontend E2E
        run: |
          mkdir -p pr-ci-context
          printf 'HEAD_SHA=%s\nHEAD_REPOSITORY=%s\nPR_NUMBER=%s\n' \
            '${{ needs.gate.outputs.head_sha }}' \
            '${{ needs.gate.outputs.head_repository }}' \
            '${{ needs.gate.outputs.pr_number }}' \
            > pr-ci-context/context.env

      - name: Upload PR CI context
        uses: actions/upload-artifact@v4
        with:
          name: pr-ci-context
          path: pr-ci-context/context.env
          if-no-files-found: error
          retention-days: 1

      - name: Upload backend E2E test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-test-results
          path: server/e2e-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload backend E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-coverage
          path: server/coverage/e2e/**
          if-no-files-found: warn
          retention-days: 30
