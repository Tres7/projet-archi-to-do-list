name: Reusable Update Integration Manifest

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  update:
    name: Update integration manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-integration-manifest
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Prepare manifest branch
        uses: ./.github/actions/prepare-manifest-branch
        with:
          branch: deploy/update-integration
          base: main

      - name: Setup Node workspace (server)
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-metadata-*
          path: release-metadata
          merge-multiple: false

      - name: Update integration manifest
        id: manifest_update
        run: >
          node .github/scripts/manifest.mjs update
          --manifest deploy/manifests/integration.yaml
          --metadata-dir release-metadata
          --summary-file integration-manifest-summary.md
          --github-output "$GITHUB_OUTPUT"

      - name: Validate integration deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/integration.yaml
          --output "$RUNNER_TEMP/integration-images.env"

      - name: Validate production deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/production.yaml
          --output "$RUNNER_TEMP/production-images.env"

      - name: Create or update integration manifest PR
        if: ${{ steps.manifest_update.outputs.changed_count != '0' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: deploy/update-integration
          base: main
          title: "chore(deploy): update integration manifest"
          commit-message: "chore(deploy): update integration manifest"
          body-path: integration-manifest-summary.md
          add-paths: deploy/manifests/integration.yaml
          delete-branch: false

      - name: Report no manifest changes
        if: ${{ steps.manifest_update.outputs.changed_count == '0' }}
        run: cat integration-manifest-summary.md >> "$GITHUB_STEP_SUMMARY"
