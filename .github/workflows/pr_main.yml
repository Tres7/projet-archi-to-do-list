name: PR Main

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect CI plan
    if: ${{ github.event.pull_request.head.ref != 'changesets/version-packages' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed_files: ${{ steps.plan.outputs.changed_files }}
      backend_required_packages: ${{ steps.plan.outputs.backend_required_packages }}
      client_changeset_required: ${{ steps.plan.outputs.client_changeset_required }}
      backend_quality: ${{ steps.plan.outputs.backend_quality }}
      backend_integration: ${{ steps.plan.outputs.backend_integration }}
      backend_license: ${{ steps.plan.outputs.backend_license }}
      client_quality: ${{ steps.plan.outputs.client_quality }}
      client_e2e: ${{ steps.plan.outputs.client_e2e }}
      client_license: ${{ steps.plan.outputs.client_license }}
      docker_compose: ${{ steps.plan.outputs.docker_compose }}
      docker_count: ${{ steps.plan.outputs.docker_count }}
      docker_matrix: ${{ steps.plan.outputs.docker_matrix }}
      manifest_checks: ${{ steps.plan.outputs.manifest_checks }}
      image_root: ${{ steps.plan.outputs.image_root }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Detect plan
        id: plan
        uses: ./.github/actions/detect-ci-plan
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}

  app-checks:
    name: App checks
    needs: changes
    if: ${{ github.event.pull_request.head.ref != 'changesets/version-packages' }}
    uses: ./.github/workflows/_pr-app-checks.yml
    with:
      backend_required_packages: ${{ needs.changes.outputs.backend_required_packages }}
      client_changeset_required: ${{ needs.changes.outputs.client_changeset_required }}
      changed_files: ${{ needs.changes.outputs.changed_files }}
      pr_head_ref: ${{ github.event.pull_request.head.ref }}
      backend_quality: ${{ needs.changes.outputs.backend_quality }}
      backend_integration: ${{ needs.changes.outputs.backend_integration }}
      backend_license: ${{ needs.changes.outputs.backend_license }}
      client_quality: ${{ needs.changes.outputs.client_quality }}
      client_e2e: ${{ needs.changes.outputs.client_e2e }}
      client_license: ${{ needs.changes.outputs.client_license }}
      manifest_checks: ${{ needs.changes.outputs.manifest_checks }}

  docker-checks:
    name: Docker checks
    needs: changes
    if: >-
      ${{
        github.event.pull_request.head.ref != 'changesets/version-packages' &&
        (
          needs.changes.outputs.docker_compose == 'true' ||
          needs.changes.outputs.docker_count != '0'
        )
      }}
    uses: ./.github/workflows/_pr-docker-checks.yml
    with:
      docker_compose: ${{ needs.changes.outputs.docker_compose }}
      docker_count: ${{ needs.changes.outputs.docker_count }}
      docker_matrix: ${{ needs.changes.outputs.docker_matrix }}
      image_root: ${{ needs.changes.outputs.image_root }}
      source_revision: ${{ github.event.pull_request.head.sha }}

  security:
    name: Security checks
    if: ${{ github.event.pull_request.head.ref != 'changesets/version-packages' }}
    uses: ./.github/workflows/_pr-security.yml

  pr-status:
    name: PR status
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - changes
      - app-checks
      - docker-checks
      - security
    if: always()
    steps:
      - name: Report skipped automated Version PR
        if: ${{ github.event.pull_request.head.ref == 'changesets/version-packages' }}
        run: echo "Automated Version Packages PR; regular PR checks intentionally skipped."

      - name: Fail on failed required checks
        if: >-
          ${{
            github.event.pull_request.head.ref != 'changesets/version-packages' &&
            (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
          }}
        run: exit 1

      - name: Report success
        if: ${{ github.event.pull_request.head.ref != 'changesets/version-packages' }}
        run: echo "All required PR checks passed or were not needed."
