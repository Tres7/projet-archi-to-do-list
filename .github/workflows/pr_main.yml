name: PR Main

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect CI plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed_files: ${{ steps.plan.outputs.changed_files }}
      docs_only: ${{ steps.plan.outputs.docs_only }}
      tests_only: ${{ steps.plan.outputs.tests_only }}
      backend_required_packages: ${{ steps.plan.outputs.backend_required_packages }}
      client_changeset_required: ${{ steps.plan.outputs.client_changeset_required }}
      backend_quality: ${{ steps.plan.outputs.backend_quality }}
      backend_integration: ${{ steps.plan.outputs.backend_integration }}
      backend_license: ${{ steps.plan.outputs.backend_license }}
      client_quality: ${{ steps.plan.outputs.client_quality }}
      client_e2e: ${{ steps.plan.outputs.client_e2e }}
      client_license: ${{ steps.plan.outputs.client_license }}
      docker_checks: ${{ steps.plan.outputs.docker_checks }}
      docker_compose: ${{ steps.plan.outputs.docker_compose }}
      docker_count: ${{ steps.plan.outputs.docker_count }}
      docker_matrix: ${{ steps.plan.outputs.docker_matrix }}
      manifest_checks: ${{ steps.plan.outputs.manifest_checks }}
      image_root: ${{ steps.plan.outputs.image_root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect plan
        id: plan
        uses: ./.github/actions/detect-ci-plan
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}

  changesets:
    name: Validate changesets
    runs-on: ubuntu-latest
    needs: changes
    if: always()
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate release changesets
        uses: ./.github/actions/validate-changesets
        with:
          backend-required-packages: ${{ needs.changes.outputs.backend_required_packages }}
          client-required: ${{ needs.changes.outputs.client_changeset_required }}
          pr-head-ref: ${{ github.event.pull_request.head.ref }}
          changed-files: ${{ needs.changes.outputs.changed_files }}

  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.backend_quality == 'true' ||
        needs.changes.outputs.backend_integration == 'true' ||
        needs.changes.outputs.backend_license == 'true'
      }}
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run backend checks
        uses: ./.github/actions/backend-checks
        with:
          run-quality: ${{ needs.changes.outputs.backend_quality }}
          run-integration: ${{ needs.changes.outputs.backend_integration }}
          run-e2e: ${{ needs.changes.outputs.backend_integration }}
          run-license: ${{ needs.changes.outputs.backend_license }}

  client-checks:
    name: Client checks
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.client_quality == 'true' ||
        needs.changes.outputs.client_e2e == 'true' ||
        needs.changes.outputs.client_license == 'true'
      }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run client checks
        uses: ./.github/actions/client-checks
        with:
          run-quality: ${{ needs.changes.outputs.client_quality }}
          run-e2e: ${{ needs.changes.outputs.client_e2e }}
          run-license: ${{ needs.changes.outputs.client_license }}

  docker-compose:
    name: Docker Compose check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docker_compose == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Docker Compose
        run: docker compose config --quiet

  docker-services:
    name: Docker service check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docker_count != '0' }}
    timeout-minutes: 35
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.changes.outputs.docker_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: ${{ matrix.dockerfile }}

      - name: Build image without pushing
        uses: ./.github/actions/build-service-image
        with:
          service: ${{ matrix.service }}
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          image-repository: ${{ needs.changes.outputs.image_root }}/${{ matrix.imageName }}
          source-revision: ${{ github.event.pull_request.head.sha }}
          version: ${{ matrix.version }}
          push: "false"

  manifest-checks:
    name: Deployment manifest checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.manifest_checks == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: Run manifest script tests
        run: node .github/scripts/manifest.test.mjs

      - name: Validate integration deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/integration.yaml
          --output "$RUNNER_TEMP/integration-images.env"

      - name: Verify integration Compose file
        run: >
          node .github/scripts/manifest.mjs verify-compose
          --manifest deploy/manifests/integration.yaml
          --compose deploy/compose/integration.yml

      - name: Validate production deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/production.yaml
          --output "$RUNNER_TEMP/production-images.env"

      - name: Verify production Compose file
        run: >
          node .github/scripts/manifest.mjs verify-compose
          --manifest deploy/manifests/production.yaml
          --compose deploy/compose/production.yml

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  pr-status:
    name: PR status
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - changes
      - changesets
      - backend-checks
      - client-checks
      - docker-compose
      - docker-services
      - manifest-checks
      - codeql
      - gitleaks
    if: always()
    steps:
      - name: Fail on failed required checks
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

      - name: Report success
        run: echo "All required PR checks passed or were not needed."
