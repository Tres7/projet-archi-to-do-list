name: PR Main

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed_files: ${{ steps.filter.outputs.all_files }}
      docs_only: >-
        ${{
          steps.filter.outputs.documentation == 'true' &&
          steps.filter.outputs.all_count == steps.filter.outputs.documentation_count
        }}
      tests_only: >-
        ${{
          steps.filter.outputs.tests == 'true' &&
          steps.filter.outputs.all_count == steps.filter.outputs.tests_count
        }}
      backend_required_packages: |
        ${{ (steps.filter.outputs.auth_runtime_source == 'true' || steps.filter.outputs.common_auth_runtime == 'true') && '@app/auth-service' || '' }}
        ${{ (steps.filter.outputs.project_runtime_source == 'true' || steps.filter.outputs.common_project_runtime == 'true') && '@app/project-service' || '' }}
        ${{ (steps.filter.outputs.task_runtime_source == 'true' || steps.filter.outputs.common_task_runtime == 'true') && '@app/task-service' || '' }}
        ${{ (steps.filter.outputs.notification_runtime_source == 'true' || steps.filter.outputs.common_notification_runtime == 'true') && '@app/notification-service' || '' }}
        ${{ steps.filter.outputs.gateway_runtime_source == 'true' && '@app/gateway' || '' }}
      client_changeset_required: ${{ steps.filter.outputs.client_runtime_source }}
      backend_quality: >-
        ${{
          steps.filter.outputs.auth_runtime_source == 'true' ||
          steps.filter.outputs.project_runtime_source == 'true' ||
          steps.filter.outputs.task_runtime_source == 'true' ||
          steps.filter.outputs.notification_runtime_source == 'true' ||
          steps.filter.outputs.gateway_runtime_source == 'true' ||
          steps.filter.outputs.backend_shared_source == 'true' ||
          steps.filter.outputs.backend_tests == 'true' ||
          steps.filter.outputs.backend_package_manifests == 'true' ||
          steps.filter.outputs.backend_dependency_files == 'true' ||
          steps.filter.outputs.backend_tooling == 'true' ||
          steps.filter.outputs.backend_ci == 'true'
        }}
      backend_integration: >-
        ${{
          steps.filter.outputs.auth_runtime_source == 'true' ||
          steps.filter.outputs.project_runtime_source == 'true' ||
          steps.filter.outputs.task_runtime_source == 'true' ||
          steps.filter.outputs.notification_runtime_source == 'true' ||
          steps.filter.outputs.gateway_runtime_source == 'true' ||
          steps.filter.outputs.backend_shared_source == 'true' ||
          steps.filter.outputs.backend_tests == 'true' ||
          steps.filter.outputs.backend_ci == 'true'
        }}
      backend_license: >-
        ${{
          steps.filter.outputs.backend_package_manifests == 'true' ||
          steps.filter.outputs.backend_dependency_files == 'true'
        }}
      client_quality: >-
        ${{
          steps.filter.outputs.client_runtime_source == 'true' ||
          steps.filter.outputs.client_tests == 'true' ||
          steps.filter.outputs.client_package_manifest == 'true' ||
          steps.filter.outputs.client_dependency_files == 'true' ||
          steps.filter.outputs.client_tooling == 'true' ||
          steps.filter.outputs.client_ci == 'true'
        }}
      client_e2e: >-
        ${{
          steps.filter.outputs.client_runtime_source == 'true' ||
          steps.filter.outputs.client_tests == 'true' ||
          steps.filter.outputs.client_ci == 'true'
        }}
      client_license: >-
        ${{
          steps.filter.outputs.client_package_manifest == 'true' ||
          steps.filter.outputs.client_dependency_files == 'true'
        }}
      docker_checks: >-
        ${{
          steps.filter.outputs.docker_compose == 'true' ||
          steps.filter.outputs.dockerfiles == 'true' ||
          steps.filter.outputs.docker_server_context == 'true' ||
          steps.filter.outputs.docker_client == 'true' ||
          steps.filter.outputs.docker_ci == 'true'
        }}
      manifest_checks: >-
        ${{
          steps.filter.outputs.deployment_manifests == 'true' ||
          steps.filter.outputs.deployment_ci == 'true' ||
          steps.filter.outputs.production_compose == 'true'
        }}
      docker_compose: ${{ steps.filter.outputs.docker_compose }}
      docker_ci: ${{ steps.filter.outputs.docker_ci }}
      docker_server_context: ${{ steps.filter.outputs.docker_server_context }}
      docker_auth: ${{ steps.filter.outputs.docker_auth }}
      docker_project: ${{ steps.filter.outputs.docker_project }}
      docker_task: ${{ steps.filter.outputs.docker_task }}
      docker_notification: ${{ steps.filter.outputs.docker_notification }}
      docker_gateway: ${{ steps.filter.outputs.docker_gateway }}
      docker_client: ${{ steps.filter.outputs.docker_client }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/filters/pr-paths.yml
          list-files: json

  changesets:
    name: Validate changesets
    runs-on: ubuntu-latest
    needs: changes
    if: always()
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release changesets
        uses: ./.github/actions/validate-changesets
        with:
          backend-required-packages: ${{ needs.changes.outputs.backend_required_packages }}
          client-required: ${{ needs.changes.outputs.client_changeset_required }}
          pr-head-ref: ${{ github.event.pull_request.head.ref }}
          changed-files: ${{ needs.changes.outputs.changed_files }}

  backend-checks:
    name: Backend checks
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.backend_quality == 'true' ||
        needs.changes.outputs.backend_integration == 'true' ||
        needs.changes.outputs.backend_license == 'true'
      }}
    uses: ./.github/workflows/_backend-pr-checks.yml
    permissions:
      contents: read
    with:
      run-quality: ${{ needs.changes.outputs.backend_quality == 'true' }}
      run-integration: ${{ needs.changes.outputs.backend_integration == 'true' }}
      run-e2e: ${{ needs.changes.outputs.backend_integration == 'true' }}
      run-license: ${{ needs.changes.outputs.backend_license == 'true' }}

  client-checks:
    name: Client checks
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.client_quality == 'true' ||
        needs.changes.outputs.client_e2e == 'true' ||
        needs.changes.outputs.client_license == 'true'
      }}
    uses: ./.github/workflows/_client-pr-checks.yml
    permissions:
      contents: read
    with:
      run-quality: ${{ needs.changes.outputs.client_quality == 'true' }}
      run-e2e: ${{ needs.changes.outputs.client_e2e == 'true' }}
      run-license: ${{ needs.changes.outputs.client_license == 'true' }}

  docker-checks:
    name: Docker checks
    needs: changes
    if: ${{ needs.changes.outputs.docker_checks == 'true' }}
    uses: ./.github/workflows/_docker-pr-checks.yml
    permissions:
      contents: read
    with:
      run-compose: ${{ needs.changes.outputs.docker_compose == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      lint-auth: ${{ needs.changes.outputs.docker_auth == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      lint-project: ${{ needs.changes.outputs.docker_project == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      lint-task: ${{ needs.changes.outputs.docker_task == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      lint-notification: ${{ needs.changes.outputs.docker_notification == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      lint-gateway: ${{ needs.changes.outputs.docker_gateway == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      lint-client: ${{ needs.changes.outputs.docker_client == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      build-auth: ${{ needs.changes.outputs.docker_auth == 'true' || needs.changes.outputs.docker_server_context == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      build-project: ${{ needs.changes.outputs.docker_project == 'true' || needs.changes.outputs.docker_server_context == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      build-task: ${{ needs.changes.outputs.docker_task == 'true' || needs.changes.outputs.docker_server_context == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      build-notification: ${{ needs.changes.outputs.docker_notification == 'true' || needs.changes.outputs.docker_server_context == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      build-gateway: ${{ needs.changes.outputs.docker_gateway == 'true' || needs.changes.outputs.docker_server_context == 'true' || needs.changes.outputs.docker_ci == 'true' }}
      build-client: ${{ needs.changes.outputs.docker_client == 'true' || needs.changes.outputs.docker_ci == 'true' }}

  manifest-checks:
    name: Deployment manifest checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.manifest_checks == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node workspace (server)
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: Run manifest script tests
        run: node .github/scripts/manifest.test.mjs

      - name: Validate integration deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/integration.yaml
          --output "$RUNNER_TEMP/integration-images.env"

      - name: Validate production deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/production.yaml
          --output "$RUNNER_TEMP/production-images.env"

  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: results.sarif

  pr-status:
    name: PR status
    runs-on: ubuntu-latest
    needs:
      - changes
      - changesets
      - backend-checks
      - client-checks
      - docker-checks
      - manifest-checks
      - gitleaks
    if: always()
    steps:
      - name: Fail on failed required checks
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

      - name: Report success
        run: echo "All required PR checks passed or were not needed."
