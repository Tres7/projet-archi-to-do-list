name: Reusable Client PR Checks

on:
  workflow_call:
    inputs:
      run-quality:
        required: true
        type: boolean
      run-e2e:
        required: true
        type: boolean
      run-license:
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  quality:
    name: Client lint and build
    runs-on: ubuntu-latest
    if: ${{ inputs.run-quality || inputs.run-license }}
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node workspace (client)
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: client

      - name: Run client linter
        if: ${{ inputs.run-quality }}
        working-directory: client
        run: npm run lint

      - name: Build client
        if: ${{ inputs.run-quality }}
        working-directory: client
        run: npm run build

      - name: Check client licenses
        if: ${{ inputs.run-license }}
        working-directory: client
        run: npx license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;CC-BY-3.0;CC-BY-4.0;Python-2.0;BlueOak-1.0.0" --excludePrivatePackages

  e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run-e2e }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run frontend E2E tests
        run: make ci-frontend-e2e

      - name: Upload frontend E2E reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-reports
          path: |
            client/playwright-report/**
            client/test-results/**
          if-no-files-found: warn
          retention-days: 30
