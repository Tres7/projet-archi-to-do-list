name: Release Images

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  detect_changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}
      git_sha: ${{ steps.release.outputs.git_sha }}
      auth_service_changed: ${{ steps.plan.outputs.auth_service_changed }}
      project_service_changed: ${{ steps.plan.outputs.project_service_changed }}
      task_service_changed: ${{ steps.plan.outputs.task_service_changed }}
      notification_service_changed: ${{ steps.plan.outputs.notification_service_changed }}
      gateway_changed: ${{ steps.plan.outputs.gateway_changed }}
      client_changed: ${{ steps.plan.outputs.client_changed }}
      build_count: ${{ steps.plan.outputs.build_count }}
      retag_count: ${{ steps.plan.outputs.retag_count }}
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      retag_matrix: ${{ steps.plan.outputs.retag_matrix }}
    steps:
      - name: Resolve release tags
        id: release
        uses: actions/github-script@v8
        with:
          script: |
            const releaseTag = context.payload.release?.tag_name;
            if (!releaseTag) {
              throw new Error('This workflow must run from a published GitHub Release.');
            }

            const dockerTagPattern = /^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$/;
            if (!dockerTagPattern.test(releaseTag)) {
              throw new Error(`Release tag '${releaseTag}' cannot be used as a Docker tag.`);
            }

            const { owner, repo } = context.repo;

            async function resolveTagSha(tag) {
              const ref = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              let object = ref.data.object;

              if (object.type === 'tag') {
                const tagObject = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: object.sha,
                });
                object = tagObject.data.object;
              }

              if (object.type !== 'commit') {
                throw new Error(`Tag '${tag}' does not resolve to a commit.`);
              }

              return object.sha;
            }

            async function isReachablePreviousTag(tag) {
              if (!tag || tag === releaseTag || !dockerTagPattern.test(tag)) {
                return false;
              }

              const compare = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${tag}...${releaseTag}`,
              });

              return compare.data.status === 'ahead' || compare.data.status === 'identical';
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            let previousTag = '';
            for (const release of releases) {
              if (release.draft || release.prerelease || release.tag_name === releaseTag) {
                continue;
              }

              try {
                if (await isReachablePreviousTag(release.tag_name)) {
                  previousTag = release.tag_name;
                  break;
                }
              } catch (error) {
                core.debug(`Skipping release '${release.tag_name}': ${error.message}`);
              }
            }

            core.setOutput('release_tag', releaseTag);
            core.setOutput('previous_tag', previousTag);
            core.setOutput('git_sha', await resolveTagSha(releaseTag));

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.git_sha }}
          fetch-depth: 0

      - name: Detect changed runtime paths
        id: changes
        if: ${{ steps.release.outputs.previous_tag != '' }}
        uses: dorny/paths-filter@v4
        with:
          base: ${{ steps.release.outputs.previous_tag }}
          ref: ${{ steps.release.outputs.release_tag }}
          filters: |
            backend_common:
              - 'server/common/**'
              - 'server/types/**'
              - 'server/package*.json'
              - 'server/tsconfig*.json'
              - 'server/.dockerignore'
            auth_service:
              - 'server/apps/auth-service/src/**'
              - 'server/apps/auth-service/package.json'
              - 'server/apps/auth-service/tsconfig.json'
              - 'server/apps/auth-service/Dockerfile'
            project_service:
              - 'server/apps/project-service/src/**'
              - 'server/apps/project-service/package.json'
              - 'server/apps/project-service/tsconfig.json'
              - 'server/apps/project-service/Dockerfile'
            task_service:
              - 'server/apps/task-service/src/**'
              - 'server/apps/task-service/package.json'
              - 'server/apps/task-service/tsconfig.json'
              - 'server/apps/task-service/Dockerfile'
            notification_service:
              - 'server/apps/notification-service/src/**'
              - 'server/apps/notification-service/package.json'
              - 'server/apps/notification-service/tsconfig.json'
              - 'server/apps/notification-service/Dockerfile'
            gateway:
              - 'server/apps/gateway/index.ts'
              - 'server/apps/gateway/src/**'
              - 'server/apps/gateway/package.json'
              - 'server/apps/gateway/tsconfig.json'
              - 'server/apps/gateway/Dockerfile'
            client:
              - 'client/src/**'
              - 'client/package*.json'
              - 'client/vite.config.ts'
              - 'client/nginx.conf'
              - 'client/Dockerfile'
              - 'client/.dockerignore'

      - name: Build release matrices
        id: plan
        uses: actions/github-script@v8
        env:
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          IMAGE_ROOT: ghcr.io/${{ github.repository }}
          BACKEND_COMMON_CHANGED: ${{ steps.changes.outputs.backend_common || 'false' }}
          AUTH_SERVICE_CHANGED: ${{ steps.changes.outputs.auth_service || 'false' }}
          PROJECT_SERVICE_CHANGED: ${{ steps.changes.outputs.project_service || 'false' }}
          TASK_SERVICE_CHANGED: ${{ steps.changes.outputs.task_service || 'false' }}
          NOTIFICATION_SERVICE_CHANGED: ${{ steps.changes.outputs.notification_service || 'false' }}
          GATEWAY_CHANGED: ${{ steps.changes.outputs.gateway || 'false' }}
          CLIENT_CHANGED: ${{ steps.changes.outputs.client || 'false' }}
        with:
          script: |
            const firstRelease = !process.env.PREVIOUS_TAG;
            const backendCommonChanged = process.env.BACKEND_COMMON_CHANGED === 'true';
            const imageRoot = process.env.IMAGE_ROOT.toLowerCase();

            const services = [
              { output: 'auth_service_changed', service: 'auth-service', group: 'backend', direct: process.env.AUTH_SERVICE_CHANGED, context: './server', dockerfile: 'apps/auth-service/Dockerfile' },
              { output: 'project_service_changed', service: 'project-service', group: 'backend', direct: process.env.PROJECT_SERVICE_CHANGED, context: './server', dockerfile: 'apps/project-service/Dockerfile' },
              { output: 'task_service_changed', service: 'task-service', group: 'backend', direct: process.env.TASK_SERVICE_CHANGED, context: './server', dockerfile: 'apps/task-service/Dockerfile' },
              { output: 'notification_service_changed', service: 'notification-service', group: 'backend', direct: process.env.NOTIFICATION_SERVICE_CHANGED, context: './server', dockerfile: 'apps/notification-service/Dockerfile' },
              { output: 'gateway_changed', service: 'gateway', group: 'backend', direct: process.env.GATEWAY_CHANGED, context: './server', dockerfile: 'apps/gateway/Dockerfile' },
              { output: 'client_changed', service: 'client', group: 'client', direct: process.env.CLIENT_CHANGED, context: './client', dockerfile: 'Dockerfile' },
            ];

            const buildItems = [];
            const retagItems = [];

            for (const item of services) {
              const changed = firstRelease ||
                item.direct === 'true' ||
                (item.group === 'backend' && backendCommonChanged);

              const matrixItem = {
                service_name: item.service,
                context: item.context,
                dockerfile: item.dockerfile,
                image_name: `${imageRoot}/${item.service}`,
              };

              core.setOutput(item.output, String(changed));

              if (changed) {
                buildItems.push(matrixItem);
              } else {
                retagItems.push(matrixItem);
              }
            }

            const placeholder = {
              service_name: 'noop',
              context: '.',
              dockerfile: 'Dockerfile',
              image_name: 'noop',
            };

            core.setOutput('build_count', String(buildItems.length));
            core.setOutput('retag_count', String(retagItems.length));
            core.setOutput('build_matrix', JSON.stringify({ include: buildItems.length ? buildItems : [placeholder] }));
            core.setOutput('retag_matrix', JSON.stringify({ include: retagItems.length ? retagItems : [placeholder] }));

            await core.summary
              .addHeading('Release image plan')
              .addTable([
                [
                  { data: 'service', header: true },
                  { data: 'action', header: true },
                  { data: 'image', header: true },
                ],
                ...buildItems.map((item) => [item.service_name, 'build', item.image_name]),
                ...retagItems.map((item) => [item.service_name, 'retag', item.image_name]),
              ])
              .write();

  build_images:
    name: Build ${{ matrix.service_name }}
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.build_count != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_changes.outputs.build_matrix) }}
    uses: ./.github/workflows/_build-ghcr-image.yml
    permissions:
      contents: read
      packages: write
    with:
      service_name: ${{ matrix.service_name }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      image_name: ${{ matrix.image_name }}
      release_tag: ${{ needs.detect_changes.outputs.release_tag }}
      git_sha: ${{ needs.detect_changes.outputs.git_sha }}

  retag_images:
    name: Retag ${{ matrix.service_name }}
    needs: detect_changes
    if: >-
      ${{
        needs.detect_changes.outputs.retag_count != '0' &&
        needs.detect_changes.outputs.previous_tag != ''
      }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_changes.outputs.retag_matrix) }}
    uses: ./.github/workflows/_retag-ghcr-image.yml
    permissions:
      packages: write
    with:
      service_name: ${{ matrix.service_name }}
      image_name: ${{ matrix.image_name }}
      previous_tag: ${{ needs.detect_changes.outputs.previous_tag }}
      release_tag: ${{ needs.detect_changes.outputs.release_tag }}
