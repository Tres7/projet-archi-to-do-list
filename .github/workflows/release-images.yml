# Deprecated: service image releases are handled by release-services.yml.
# This placeholder keeps the old workflow name visible without preserving an
# accidental release path that can retag or rebuild unchanged services.
name: Deprecated Release Images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deprecated:
    name: Deprecated workflow
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report deprecation
        run: |
          {
            echo "## Deprecated workflow"
            echo
            echo "Release Images has been replaced by Release Services."
            echo "This workflow intentionally performs no Docker, tag, or GitHub Release operations."
          } >> "$GITHUB_STEP_SUMMARY"
