name: Reusable Build GHCR Image

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      image_name:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      git_sha:
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.git_sha }}

      - name: Configure Docker Hub mirror
        shell: bash
        run: |
          set -euo pipefail

          mirror="https://mirror.gcr.io"
          sudo mkdir -p /etc/docker
          tmp_config="$(mktemp)"

          if [ -f /etc/docker/daemon.json ]; then
            jq --arg mirror "$mirror" \
              '.["registry-mirrors"] = ((.["registry-mirrors"] // []) + [$mirror] | unique)' \
              /etc/docker/daemon.json > "$tmp_config"
          else
            jq -n --arg mirror "$mirror" '{ "registry-mirrors": [$mirror] }' > "$tmp_config"
          fi

          sudo mv "$tmp_config" /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull BuildKit image
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            if docker pull "$BUILDKIT_IMAGE"; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              exit 1
            fi

            sleep $((attempt * 10))
          done

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ inputs.release_tag }}
            type=raw,value=sha-${{ inputs.git_sha }}
            type=raw,value=latest

      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service_name }}

      - name: Scan image with Trivy (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ inputs.release_tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan image with Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ inputs.release_tag }}
          format: sarif
          output: trivy-${{ inputs.service_name }}.sarif
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: trivy-${{ inputs.service_name }}.sarif

      - name: Push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service_name }}
