name: Docker Compose Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "compose.yaml"
      - "**/Dockerfile"

jobs:
  validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config --quiet