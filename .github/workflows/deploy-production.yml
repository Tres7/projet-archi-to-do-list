name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - deploy/manifests/production.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate production manifest deployment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node workspace (server)
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: Validate production deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/production.yaml
          --output "$RUNNER_TEMP/production-images.env"

      - name: Report blocked deployment
        run: |
          {
            echo "## Production deployment blocked"
            echo
            echo "No production deployment target is configured in this repository."
            echo "Validated manifest schema, immutable image refs, generated Compose env, and Compose config only."
            echo "Configure the production GitHub Environment with required reviewers before attaching a real deployment runner."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
