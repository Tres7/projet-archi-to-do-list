name: Nightly

on:
  schedule:
    - cron: "30 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Audit server
        run: npm --prefix server audit --audit-level=high

      - name: Audit client
        run: npm --prefix client audit --audit-level=high

  production-images:
    name: Read production images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      count: ${{ steps.images.outputs.count }}
      matrix: ${{ steps.images.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: List production image refs
        id: images
        run: >
          node .github/scripts/manifest.mjs list-images
          --manifest deploy/manifests/production.yaml
          --github-output "$GITHUB_OUTPUT"

  trivy:
    name: Trivy ${{ matrix.service }}
    needs: production-images
    if: ${{ needs.production-images.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.production-images.outputs.matrix) }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Scan image digest with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
