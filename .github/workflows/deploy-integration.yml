name: Deploy Integration

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref recorded for this deployment.
        required: true
        type: string
        default: main
      deploy_path:
        description: Absolute deployment directory on the integration VM.
        required: true
        type: string
        default: /opt/projet-archi-to-do-list-integration
      manifest_version:
        description: Deployment manifest version. Defaults to the latest manifest.
        required: false
        type: string
        default: ""

concurrency:
  group: deploy-integration
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-compose.yml
    with:
      deploy_ref: ${{ inputs.deploy_ref }}
      deploy_path: ${{ inputs.deploy_path }}
      deployment_name: todo-integration
      environment_name: integration
      manifest_version: ${{ inputs.manifest_version }}
    secrets:
      vm_host: ${{ secrets.VM_HOST_INT }}
      vm_user: ${{ secrets.VM_USER_INT }}
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_INT }}
