name: Deploy Integration

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy.
        required: true
        type: string
        default: main
      deploy_path:
        description: Absolute deployment directory on the integration VM.
        required: true
        type: string
        default: /opt/projet-archi-to-do-list-integration

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-integration
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate inputs
        shell: bash
        env:
          DEPLOY_REF: ${{ inputs.deploy_ref }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          set -euo pipefail

          if [[ -z "$DEPLOY_REF" || ! "$DEPLOY_REF" =~ ^[A-Za-z0-9._/@-]+$ ]]; then
            echo "::error::deploy_ref must contain only letters, numbers, dots, underscores, slashes, @, or dashes."
            exit 1
          fi

          if [[ -z "$DEPLOY_PATH" || "$DEPLOY_PATH" != /* || "$DEPLOY_PATH" = "/" ]]; then
            echo "::error::deploy_path must be an absolute path and must not be /."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.deploy_ref }}
          fetch-depth: 0

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace
        with:
          working-directory: server

      - name: Validate integration deployment manifest
        run: >
          node .github/scripts/manifest.mjs validate-compose
          --manifest deploy/manifests/integration.yaml
          --output "$RUNNER_TEMP/integration-images.env"

      - name: Verify integration Compose file
        run: >
          node .github/scripts/manifest.mjs verify-compose
          --manifest deploy/manifests/integration.yaml
          --compose deploy/compose/integration.yml

      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_REPOSITORY: ${{ github.repository }}
          DEPLOY_REF: ${{ inputs.deploy_ref }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VM_HOST_INT }}
          username: ${{ secrets.VM_USER_INT }}
          key: ${{ secrets.SSH_PRIVATE_KEY_INT }}
          envs: DEPLOY_REPOSITORY,DEPLOY_REF,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN
          command_timeout: 20m
          script: |
            set -eu

            case "${DEPLOY_REF:-}" in
              ""|*[!A-Za-z0-9._/@-]*)
                echo "DEPLOY_REF contains unsupported characters."
                exit 1
                ;;
            esac

            case "${DEPLOY_PATH:-}" in
              ""|"/")
                echo "DEPLOY_PATH must not be empty or /."
                exit 1
                ;;
              /*)
                ;;
              *)
                echo "DEPLOY_PATH must be absolute."
                exit 1
                ;;
            esac

            if [ -z "${DEPLOY_REPOSITORY:-}" ] || [ -z "${GHCR_USER:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
              echo "Missing deployment environment variables."
              exit 1
            fi

            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                SUDO="sudo"
              else
                echo "The deployment user must be root or have passwordless sudo."
                exit 1
              fi
            fi

            install_packages() {
              if ! command -v apt-get >/dev/null 2>&1; then
                echo "Automatic bootstrap supports apt-based Linux servers only."
                echo "Install ca-certificates, curl, tar, Docker, and the Docker Compose plugin manually."
                exit 1
              fi

              $SUDO apt-get update
              $SUDO env DEBIAN_FRONTEND=noninteractive apt-get install -y \
                ca-certificates \
                curl \
                tar \
                docker.io \
                docker-compose-plugin
            }

            if ! command -v curl >/dev/null 2>&1 || \
              ! command -v tar >/dev/null 2>&1 || \
              ! command -v docker >/dev/null 2>&1; then
              install_packages
            fi

            if command -v systemctl >/dev/null 2>&1; then
              $SUDO systemctl enable --now docker
            elif command -v service >/dev/null 2>&1; then
              $SUDO service docker start || true
            fi

            docker_cmd() {
              $SUDO docker "$@"
            }

            if ! docker_cmd compose version >/dev/null 2>&1; then
              install_packages
            fi

            if ! docker_cmd compose version >/dev/null 2>&1; then
              echo "Docker Compose plugin is required."
              exit 1
            fi

            DEPLOY_ROOT="${DEPLOY_PATH%/}"
            APP_DIR="$DEPLOY_ROOT/app"
            RELEASE_DIR="$DEPLOY_ROOT/release"
            PREVIOUS_DIR="$DEPLOY_ROOT/previous"
            SHARED_DIR="$DEPLOY_ROOT/shared"
            SHARED_ENV="$SHARED_DIR/server.env.docker"
            SHARED_COMPOSE_ENV="$SHARED_DIR/compose.env"
            TMP_DIR="$(mktemp -d)"

            cleanup() {
              rm -rf "$TMP_DIR"
            }
            trap cleanup EXIT HUP INT TERM

            $SUDO mkdir -p "$DEPLOY_ROOT" "$SHARED_DIR"
            $SUDO chown -R "$(id -u):$(id -g)" "$DEPLOY_ROOT"

            ARCHIVE="$TMP_DIR/source.tar.gz"
            curl -fsSL \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$DEPLOY_REPOSITORY/tarball/$DEPLOY_REF" \
              -o "$ARCHIVE"

            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$ARCHIVE" -C "$RELEASE_DIR" --strip-components=1

            if [ -f "$APP_DIR/server/.env.docker" ] && [ ! -f "$SHARED_ENV" ]; then
              cp "$APP_DIR/server/.env.docker" "$SHARED_ENV"
            fi

            if [ -f "$SHARED_ENV" ]; then
              cp "$SHARED_ENV" "$RELEASE_DIR/server/.env.docker"
            elif [ -f "$RELEASE_DIR/server/.env.docker" ]; then
              cp "$RELEASE_DIR/server/.env.docker" "$SHARED_ENV"
            else
              echo "Missing server environment file. Create $SHARED_ENV before deploying."
              exit 1
            fi

            if [ -f "$SHARED_COMPOSE_ENV" ]; then
              cp "$SHARED_COMPOSE_ENV" "$RELEASE_DIR/.env"
            else
              cat > "$RELEASE_DIR/.env" <<'COMPOSE_ENV'
            MYSQL_PORT_PUBLISHED=127.0.0.1:3306
            REDIS_PORT_PUBLISHED=127.0.0.1:6379
            MAILPIT_SMTP_PORT_PUBLISHED=127.0.0.1:1025
            MAILPIT_UI_PORT_PUBLISHED=127.0.0.1:8025
            GATEWAY_PORT_PUBLISHED=127.0.0.1:3000
            CLIENT_PORT_PUBLISHED=80
            COMPOSE_ENV
              cp "$RELEASE_DIR/.env" "$SHARED_COMPOSE_ENV"
            fi

            rm -rf "$PREVIOUS_DIR"
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$PREVIOUS_DIR"
            fi
            mv "$RELEASE_DIR" "$APP_DIR"

            compose_cmd() {
              docker_cmd compose \
                --project-name todo-integration \
                --project-directory "$APP_DIR" \
                -f "$APP_DIR/deploy/compose/integration.yml" \
                "$@"
            }

            printf '%s' "$GHCR_TOKEN" | docker_cmd login ghcr.io -u "$GHCR_USER" --password-stdin

            compose_cmd config --quiet
            compose_cmd pull

            if compose_cmd up --help | grep -q -- '--wait'; then
              compose_cmd up -d --wait --remove-orphans
            else
              compose_cmd up -d --remove-orphans
            fi

            compose_cmd ps
            echo "Integration deployment finished in $APP_DIR."
