name: PR Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Prepare test output directory
        working-directory: server
        run: mkdir -p test_outputs

      - name: Run backend unit tests with coverage
        working-directory: server
        run: npm run test:unit -- --coverage --json --outputFile=unit-results.json

      - name: Upload unit test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: server/unit-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage
          path: server/coverage/unit/**
          if-no-files-found: warn
          retention-days: 30

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend integration tests with coverage
        run: make ci-backend-integration

      - name: Upload integration test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: server/integration-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-coverage
          path: server/coverage/integration/**
          if-no-files-found: warn
          retention-days: 30

  backend-e2e:
    name: Backend E2E tests
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend E2E tests with coverage
        run: make ci-backend-e2e

      - name: Upload backend E2E test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-test-results
          path: server/e2e-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload backend E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-coverage
          path: server/coverage/e2e/**
          if-no-files-found: warn
          retention-days: 30

  frontend-e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright system dependencies
        working-directory: client
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: client
        run: npx playwright install chromium

      - name: Run frontend E2E tests
        run: make ci-frontend-e2e

      - name: Upload frontend E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-reports
          path: |
            client/playwright-report/**
            client/test-results/**
          if-no-files-found: warn
          retention-days: 30
